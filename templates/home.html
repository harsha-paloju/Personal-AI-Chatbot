<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personal AI Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <!-- Header -->

        <div class="header">

            <h1>🤖 Personal AI Chatbot</h1>

            <p>Your own AI assistant powered by Ollama</p>

        </div>

        <!-- Chat Area -->

        <div class="chat-area">

            {% if user_message %}

            <div class="chat user-chat">

                <div class="chat-title">
                    👤 You
                </div>

                <div class="chat-message">
                    {{ user_message }}
                </div>

            </div>

            {% endif %}


            {% if message %}

            <div class="chat ai-chat">

                <div class="chat-title">
                    🤖 AI Assistant
                </div>

                <div class="chat-message bot-message">
                    {{ message }}
                </div>

            </div>

            {% endif %}

        </div>

        <!-- Input Form -->

        <form action="/" method="POST" class="input-form">

            <input
                type="text"
                name="message"
                placeholder="Ask me anything..."
                autocomplete="off"
                required>

            <button type="submit">

                Send

            </button>

        </form>

    </div>

</body>

</html>
